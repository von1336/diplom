version: '3.9'

services:

  # Redis — брокер сообщений для Celery
  redis:
    image: redis:7-alpine
    container_name: diplom_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Django — основное веб-приложение
  web:
    build: .
    container_name: diplom_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=netology_pd_diplom.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  # Celery worker — обрабатывает асинхронные задачи (email, импорт)
  celery:
    build: .
    container_name: diplom_celery
    command: celery -A netology_pd_diplom worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=netology_pd_diplom.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - web
    restart: unless-stopped
